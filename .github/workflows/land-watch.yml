name: land-watch

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: land-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run web watcher (Google Alerts RSS)
        env:
          SEND_VIA:           ${{ secrets.SEND_VIA }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python land_watch.py

      - name: Run email ingest (machine mailbox)
        env:
          EMAIL_USER:         ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_FOLDER:       ${{ secrets.EMAIL_FOLDER }}
          SEND_VIA:           ${{ secrets.SEND_VIA }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "${EMAIL_USER}" ]; then python email_ingest.py; else echo "email ingest skipped"; fi

      - name: Persist state (findings + seen)
        run: |
          git config user.name  "land-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add findings.json seen.json seen_email.json 2>/dev/null || true
          git commit -m "update findings [skip ci]" || echo "no changes"
          git pull --rebase origin main || true
          git push || echo "nothing to push"