name: land-watch

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: land-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt google-cloud-firestore google-auth

      # ═══ חדש: מושך את פרופיל הסינון מהאתר (Firestore) לפני הסריקה ═══
      - name: Sync profile from Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python firestore_sync.py profile || echo "profile sync skipped"

      - name: Run web watcher (Google Alerts RSS)
        env:
          SEND_VIA:           ${{ secrets.SEND_VIA }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python land_watch.py

      - name: Run email ingest (machine mailbox)
        env:
          EMAIL_USER:         ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_FOLDER:       ${{ secrets.EMAIL_FOLDER }}
          SEND_VIA:           ${{ secrets.SEND_VIA }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "${EMAIL_USER}" ]; then python email_ingest.py; else echo "email ingest skipped"; fi

      # ═══ חדש: מעלה ממצאים חדשים ל-Firestore (הפיד באתר) ═══
      - name: Sync findings to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python firestore_sync.py findings || echo "findings sync skipped"

      # ═══ חדש: פעימת-לב יומית בטלגרם (בריצה של 05:00 UTC = 08:00 בישראל) ═══
      - name: Daily heartbeat
        if: ${{ github.event_name == 'schedule' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "$(date -u +%H)" = "05" ]; then python firestore_sync.py heartbeat; else echo "not heartbeat hour"; fi

      - name: Persist state (findings + seen)
        run: |
          git config user.name  "land-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "update findings [skip ci]" || echo "no changes"
          git pull --rebase origin main || true
          git push || echo "nothing to push"